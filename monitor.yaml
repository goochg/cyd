esphome:
  name: cyd-monitor
  on_boot:
    priority: 600
    then:
      - switch.turn_on: touch_cs
      - switch.turn_on: sd_cs
      - number.set:
          id: cpu_usage
          value: 0
      - number.set:
          id: ram_usage
          value: 0
      - number.set:
          id: cpu_temp
          value: 0

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

# Include secrets for WiFi credentials
substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

# Switches to disable Touch and SD Card to prevent SPI bus interference
switch:
  - platform: gpio
    pin: 33
    id: touch_cs
    name: "Touch CS Disable"
    restore_mode: ALWAYS_ON # ON = High = Disabled
    internal: true
  - platform: gpio
    pin: 5
    id: sd_cs
    name: "SD CS Disable"
    restore_mode: ALWAYS_ON # ON = High = Disabled
    internal: true

output:
  - platform: ledc
    pin: 21
    id: backlight_pin

light:
  - platform: monochromatic
    output: backlight_pin
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

web_server:
  port: 80

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"

spi:
  clk_pin: 14
  mosi_pin: 13
  miso_pin: 12

display:
  - platform: mipi_spi
    model: ILI9341
    id: my_display
    cs_pin: 15
    dc_pin: 2
    rotation: 270 # Landscape
    dimensions:
      width: 240
      height: 320
    invert_colors: true
    lambda: |-
      // Fill with White to get Black BG (due to invert_colors)
      it.fill(Color(255, 255, 255));
      
      float cpu = 0.0;
      float ram = 0.0;
      float temp = 0.0;
      
      if (!isnan(id(cpu_usage).state)) cpu = id(cpu_usage).state;
      if (!isnan(id(ram_usage).state)) ram = id(ram_usage).state;
      if (!isnan(id(cpu_temp).state)) temp = id(cpu_temp).state;

      // Title (Cyan)
      it.print(10, 10, id(roboto), Color(255, 0, 0), "SYSTEM MONITOR");

      // CPU Stats (Magenta)
      it.printf(10, 60, id(roboto), Color(255, 0, 255), "CPU: %.1f%%", cpu);
      
      // RAM Stats (Yellow)
      it.printf(10, 110, id(roboto), Color(255, 255, 0), "RAM: %.1f%%", ram);

      // Temp (Green)
      it.printf(10, 160, id(roboto), Color(0, 255, 0), "Temp: %.1f C", temp);

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 25

number:
  - platform: template
    name: "CPU Usage"
    id: cpu_usage
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    on_value:
      then:
        - component.update: my_display

  - platform: template
    name: "RAM Usage"
    id: ram_usage
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    on_value:
      then:
        - component.update: my_display

  - platform: template
    name: "CPU Temp"
    id: cpu_temp
    min_value: 0
    max_value: 120
    step: 1
    optimistic: true
    on_value:
      then:
        - component.update: my_display
